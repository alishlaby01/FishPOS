bind 0.0.0.0
protected-mode no
port 6379
tcp-keepalive 300
timeout 0

# Memory hard limit suitable for small/medium POS workloads
maxmemory 256mb
maxmemory-policy allkeys-lru

# AOF persistence tuned for durability + reasonable performance
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite yes
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB snapshots disabled (AOF is the persistence strategy)
save ""

# Basic hardening (Commented out to allow Laravel to clear cache)
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""